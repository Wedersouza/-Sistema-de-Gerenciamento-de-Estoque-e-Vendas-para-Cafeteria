<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar — Torra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:ital,wght@0,500;0,700;1,500&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .login-layout { min-height: 100vh; display: flex; }

  .login-hero {
    flex: 1.1;
    min-width: 420px;
    background: radial-gradient(circle at 30% 20%, #4A2E1E, #2A190E 70%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px;
  }
  .login-hero::before {
    content: "";
    position: absolute; top: -60px; right: -60px;
    width: 280px; height: 280px; border-radius: 50%;
    border: 1px solid rgba(243,231,214,0.15);
  }
  .login-hero::after {
    content: "";
    position: absolute; bottom: -100px; left: -80px;
    width: 320px; height: 320px; border-radius: 50%;
    background: rgba(199,123,59,0.15);
  }
  .login-hero-content { position: relative; z-index: 1; }
  .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
  .login-brand-icon {
    width: 44px; height: 44px; border-radius: 12px; background: var(--color-accent);
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .login-brand-name { font-family: var(--font-heading); font-size: 26px; font-weight: 700; color: var(--sidebar-headline); }
  .login-headline { font-family: var(--font-heading); font-size: 44px; line-height: 1.15; color: var(--sidebar-headline); max-width: 420px; margin-bottom: 20px; }
  .login-subtext { font-size: 15px; line-height: 1.6; color: var(--sidebar-text-muted); max-width: 360px; }

  .login-form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .login-form-wrap { width: 100%; max-width: 380px; }
  .login-eyebrow { font-size: 13px; font-weight: 600; letter-spacing: .04em; color: var(--color-text-muted); margin-bottom: 6px; }
  .login-title { font-family: var(--font-heading); font-size: 30px; font-weight: 700; color: var(--color-text); margin-bottom: 32px; }

  .login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .login-field span { font-size: 13px; font-weight: 600; color: var(--color-text); }
  .login-field input {
    border: 1px solid var(--color-border-strong); border-radius: 10px;
    padding: 12px 14px; font-size: 14px; font-family: var(--font-body);
    background: var(--color-card-bg); color: var(--color-text); outline: none;
  }

  .login-forgot { display: flex; justify-content: flex-end; margin: -8px 0 18px; }
  .login-forgot a { font-size: 12.5px; text-decoration: none; }

  .login-submit {
    display: block; width: 100%; text-align: center; text-decoration: none;
    background: var(--color-accent); color: var(--color-accent-dark); font-weight: 700;
    font-size: 15px; padding: 13px 0; border: none; border-radius: 10px; cursor: pointer;
    font-family: var(--font-body);
  }

  .login-signup {
    margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--color-border-strong);
    text-align: center; font-size: 13.5px; color: var(--color-text-secondary);
  }
  .login-signup a { font-weight: 600; text-decoration: none; }

  .login-error {
    display: none; background: var(--color-danger-bg); color: var(--color-danger);
    font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 18px;
  }
</style>
</head>
<body>

<div class="login-layout">
  <div class="login-hero">
    <div class="login-hero-content">
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 9h13a3 3 0 0 1 0 6h-1" stroke="#2A190E" stroke-width="1.8" stroke-linecap="round"/><path d="M4 9v7a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V9" stroke="#2A190E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 5.5c0 1-1 1-1 2M11 5.5c0 1-1 1-1 2" stroke="#2A190E" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="login-brand-name">Torra</div>
      </div>
      <div class="login-headline">Cada xícara,<br/>um pedido sob controle.</div>
      <div class="login-subtext">Estoque, vendas, clientes e fornecedores da sua cafeteria em um só lugar.</div>
    </div>
  </div>

  <div class="login-form-side">
    <div class="login-form-wrap">
      <div class="login-eyebrow">BEM-VINDO DE VOLTA</div>
      <div class="login-title">Entrar na sua conta</div>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <label class="login-field">
          <span>E-mail ou login</span>
          <input type="text" name="login" placeholder="voce@torracafe.com" required>
        </label>
        <label class="login-field">
          <span>Senha</span>
          <input type="password" name="senha" placeholder="••••••••" required>
        </label>
        <div class="login-forgot"><a href="#">Esqueci minha senha</a></div>
        <button type="submit" class="login-submit">Entrar</button>
      </form>

      <div class="login-signup">
        Não tem conta? <a href="cadastro-usuario.html">Cadastre-se</a>
      </div>
    </div>
  </div>
</div>

<script>
  // TODO (Etapa 3 - Autenticação): substituir por POST real para /api/login.
  document.getElementById("login-form").addEventListener("submit", (e) => {
    e.preventDefault();
    console.log("Login ainda não implementado — aguardando Etapa 3.");
  });
</script>
</body>
</html>
