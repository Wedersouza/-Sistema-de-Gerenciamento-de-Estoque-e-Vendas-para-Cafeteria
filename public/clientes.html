<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clientes — Torra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .clientes-grid { grid-template-columns: 1.4fr 1fr 1.4fr 1.6fr 100px 150px; }
</style>
</head>
<body data-page="clientes">

<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="app-content">
    <div class="page-header">
      <div class="page-title">Clientes</div>
      <button class="btn btn-primary" id="btn-novo-cliente">+ Novo Cliente</button>
    </div>
    <div class="page-subtitle">Base de clientes para vendas com histórico.</div>

    <input type="text" class="input" id="filtro-busca" style="max-width:380px;display:block;margin-bottom:20px;" placeholder="Buscar por nome, telefone ou e-mail...">

    <div class="table-card">
      <div class="table-head-row clientes-grid">
        <div>NOME</div><div>TELEFONE</div><div>E-MAIL</div><div>ENDEREÇO</div><div>STATUS</div><div>AÇÕES</div>
      </div>
      <div id="clientes-tbody"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-cliente" style="display:none;">
    <div class="modal" style="width:440px;">
      <div class="modal-title" id="modal-cliente-titulo">Novo Cliente</div>
      <form id="form-cliente">
        <div style="display:flex;flex-direction:column;gap:14px;">
          <label class="field">
            <span>Nome completo</span>
            <input type="text" name="nome" placeholder="Ex: Marina Costa" required>
          </label>
          <label class="field">
            <span>Telefone</span>
            <input type="text" name="telefone" placeholder="(11) 90000-0000">
          </label>
          <label class="field">
            <span>E-mail</span>
            <input type="email" name="email" placeholder="nome@email.com">
          </label>
          <label class="field">
            <span>Endereço</span>
            <input type="text" name="endereco" placeholder="Rua, número, bairro">
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancelar-cliente">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Cliente</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/partials.js"></script>
<script>
  let CLIENTS = [];

  const buscaInput = document.getElementById('filtro-busca');
  const tbody = document.getElementById('clientes-tbody');

  async function carregarClientes() {
    const resp = await fetch('/api/clientes');
    CLIENTS = await resp.json();
    renderClientes();
  }

  function renderClientes() {
    const q = buscaInput.value.toLowerCase();
    const filtrados = CLIENTS.filter(c =>
      !q || c.nome.toLowerCase().includes(q) || (c.telefone || '').includes(q) || (c.email || '').toLowerCase().includes(q)
    );

    if (filtrados.length === 0) {
      tbody.innerHTML = '<div class="empty-state">Nenhum cliente encontrado.</div>';
      return;
    }

    tbody.innerHTML = filtrados.map(c => `
      <div class="table-row clientes-grid">
        <div style="font-weight:600;">${c.nome}</div>
        <div style="color:var(--color-text-secondary);">${c.telefone || '—'}</div>
        <div style="color:var(--color-text-secondary);">${c.email || '—'}</div>
        <div style="color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.endereco || '—'}</div>
        <div><span class="pill pill-sm ${c.ativo ? 'pill-success' : 'pill-neutral'}">${c.ativo ? 'Ativo' : 'Inativo'}</span></div>
        <div class="table-actions">
          <button data-editar="${c.id}">Editar</button>
          ${c.ativo ? `<button data-inativar="${c.id}">Inativar</button>` : `<button data-reativar="${c.id}">Reativar</button>`}
        </div>
      </div>
    `).join('');

    tbody.querySelectorAll('[data-inativar]').forEach(btn => {
      btn.addEventListener('click', () => inativarCliente(btn.dataset.inativar));
    });
    tbody.querySelectorAll('[data-reativar]').forEach(btn => {
      btn.addEventListener('click', () => reativarCliente(btn.dataset.reativar));
    });
    tbody.querySelectorAll('[data-editar]').forEach(btn => {
      btn.addEventListener('click', () => abrirEdicao(btn.dataset.editar));
    });
  }

  async function inativarCliente(id) {
    await fetch(`/api/clientes/${id}/inativar`, { method: 'PATCH' });
    carregarClientes();
  }

  async function reativarCliente(id) {
    await fetch(`/api/clientes/${id}/reativar`, { method: 'PATCH' });
    carregarClientes();
  }

  buscaInput.addEventListener('input', renderClientes);

  let editandoId = null;
  const modal = document.getElementById('modal-cliente');
  const modalTitulo = document.getElementById('modal-cliente-titulo');
  const form = document.getElementById('form-cliente');

  document.getElementById('btn-novo-cliente').addEventListener('click', () => {
    editandoId = null;
    modalTitulo.textContent = 'Novo Cliente';
    form.reset();
    modal.style.display = 'flex';
  });

  function abrirEdicao(id) {
    const cliente = CLIENTS.find(c => c.id == id);
    editandoId = id;
    modalTitulo.textContent = 'Editar Cliente';
    form.nome.value = cliente.nome;
    form.telefone.value = cliente.telefone || '';
    form.email.value = cliente.email || '';
    form.endereco.value = cliente.endereco || '';
    modal.style.display = 'flex';
  }

  document.getElementById('btn-cancelar-cliente').addEventListener('click', () => modal.style.display = 'none');
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

  document.getElementById('form-cliente').addEventListener('submit', async (e) => {
    e.preventDefault();
    const dados = new FormData(e.target);

    const corpo = {
      nome: dados.get('nome'),
      telefone: dados.get('telefone'),
      email: dados.get('email'),
      endereco: dados.get('endereco'),
    };

    const resp = editandoId
      ? await fetch(`/api/clientes/${editandoId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(corpo),
        })
      : await fetch('/api/clientes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(corpo),
        });

    if (!resp.ok) {
      const erro = await resp.json();
      alert(erro.erro || 'Erro ao salvar cliente.');
      return;
    }

    e.target.reset();
    modal.style.display = 'none';
    carregarClientes();
  });

  carregarClientes();
</script>
</body>
</html>
