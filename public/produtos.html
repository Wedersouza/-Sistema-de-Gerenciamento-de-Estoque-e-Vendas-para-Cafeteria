<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Produtos — Torra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .produtos-grid { grid-template-columns: 90px 2fr 1.1fr 1.3fr 90px 110px 90px 150px; }
</style>
</head>
<body data-page="produtos">

<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="app-content">
    <div class="page-header">
      <div class="page-title">Produtos</div>
      <button class="btn btn-primary" id="btn-novo-produto">+ Novo Produto</button>
    </div>
    <div class="page-subtitle">Controle de estoque integrado ao catálogo de venda.</div>

    <div class="toolbar">
      <input type="text" class="input" id="filtro-busca" placeholder="Buscar por nome ou SKU...">
      <select class="select" id="filtro-categoria">
        <option value="todas">Todas as categorias</option>
        <option value="Bebidas">Bebidas</option>
        <option value="Salgados">Salgados</option>
        <option value="Sobremesas">Sobremesas</option>
        <option value="Insumos">Insumos</option>
      </select>
    </div>

    <div class="table-card">
      <div class="table-head-row produtos-grid">
        <div>SKU</div><div>NOME</div><div>CATEGORIA</div><div>FORNECEDOR</div><div>PREÇO</div><div>ESTOQUE</div><div>STATUS</div><div>AÇÕES</div>
      </div>
      <div id="produtos-tbody"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-produto" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="modal-produto-titulo">Novo Produto</div>
      <form id="form-produto">
        <div class="field-grid">
          <label class="field field-full">
            <span>Nome do produto</span>
            <input type="text" name="nome" placeholder="Ex: Cappuccino 300ml" required>
          </label>
          <label class="field">
            <span>SKU</span>
            <input type="text" name="sku" placeholder="P0XX" required>
          </label>
          <label class="field">
            <span>Categoria</span>
            <select name="categoria">
              <option>Bebidas</option><option>Salgados</option><option>Sobremesas</option><option>Insumos</option>
            </select>
          </label>
          <label class="field">
            <span>Fornecedor</span>
            <select name="fornecedor_id" id="select-fornecedor">
              <option value="">Nenhum</option>
            </select>
          </label>
          <label class="field">
            <span>Preço de venda</span>
            <input type="text" name="preco" placeholder="R$ 0,00">
          </label>
          <label class="field">
            <span>Estoque atual</span>
            <input type="number" name="estoque" placeholder="0">
          </label>
          <label class="field">
            <span>Estoque mínimo</span>
            <input type="number" name="estoqueMinimo" placeholder="0">
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancelar-produto">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Produto</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/partials.js"></script>
<script>
  let PRODUCTS = [];

  const buscaInput = document.getElementById('filtro-busca');
  const categoriaSelect = document.getElementById('filtro-categoria');
  const tbody = document.getElementById('produtos-tbody');

  async function carregarProdutos() {
    const resp = await fetch('/api/produtos');
    PRODUCTS = await resp.json();
    renderProdutos();
  }

  async function carregarFornecedoresSelect() {
    const resp = await fetch('/api/fornecedores');
    const fornecedores = await resp.json();
    const select = document.getElementById('select-fornecedor');
    fornecedores.filter(f => f.ativo).forEach(f => {
      const option = document.createElement('option');
      option.value = f.id;
      option.textContent = f.nome_fantasia;
      select.appendChild(option);
    });
  }

  function renderProdutos() {
    const busca = buscaInput.value.toLowerCase();
    const categoria = categoriaSelect.value;

    const filtrados = PRODUCTS
      .filter(p => categoria === 'todas' || p.categoria === categoria)
      .filter(p => !busca || p.nome.toLowerCase().includes(busca) || p.sku.toLowerCase().includes(busca));

    if (filtrados.length === 0) {
      tbody.innerHTML = '<div class="empty-state">Nenhum produto encontrado.</div>';
      return;
    }

    tbody.innerHTML = filtrados.map(p => {
      const baixo = p.estoque < p.estoque_minimo;
      return `
        <div class="table-row produtos-grid">
          <div style="color:var(--color-text-muted);font-size:12.5px;">${p.sku}</div>
          <div style="font-weight:600;">${p.nome}</div>
          <div style="color:var(--color-text-secondary);">${p.categoria || '—'}</div>
          <div style="color:var(--color-text-secondary);">${p.fornecedor_nome || '—'}</div>
          <div>R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
          <div><span class="pill ${baixo ? 'pill-danger' : 'pill-success'}">${p.estoque} un.</span></div>
          <div><span class="pill pill-sm ${p.ativo ? 'pill-success' : 'pill-neutral'}">${p.ativo ? 'Ativo' : 'Inativo'}</span></div>
          <div class="table-actions">
            <button data-editar="${p.id}">Editar</button>
            ${p.ativo ? `<button data-inativar="${p.id}">Inativar</button>` : `<button data-reativar="${p.id}">Reativar</button>`}
          </div>
        </div>
      `;
    }).join('');

    tbody.querySelectorAll('[data-inativar]').forEach(btn => {
      btn.addEventListener('click', () => inativarProduto(btn.dataset.inativar));
    });
    tbody.querySelectorAll('[data-reativar]').forEach(btn => {
      btn.addEventListener('click', () => reativarProduto(btn.dataset.reativar));
    });
    tbody.querySelectorAll('[data-editar]').forEach(btn => {
      btn.addEventListener('click', () => abrirEdicao(btn.dataset.editar));
    });
  }

  async function inativarProduto(id) {
    await fetch(`/api/produtos/${id}/inativar`, { method: 'PATCH' });
    carregarProdutos();
  }

  async function reativarProduto(id) {
    await fetch(`/api/produtos/${id}/reativar`, { method: 'PATCH' });
    carregarProdutos();
  }

  buscaInput.addEventListener('input', renderProdutos);
  categoriaSelect.addEventListener('change', renderProdutos);

  let editandoId = null;
  const modal = document.getElementById('modal-produto');
  const modalTitulo = document.getElementById('modal-produto-titulo');
  const form = document.getElementById('form-produto');

  document.getElementById('btn-novo-produto').addEventListener('click', () => {
    editandoId = null;
    modalTitulo.textContent = 'Novo Produto';
    form.reset();
    form.sku.disabled = false;
    modal.style.display = 'flex';
  });

  function abrirEdicao(id) {
    const produto = PRODUCTS.find(p => p.id == id);
    editandoId = id;
    modalTitulo.textContent = 'Editar Produto';
    form.nome.value = produto.nome;
    form.sku.value = produto.sku;
    form.sku.disabled = true;
    form.categoria.value = produto.categoria || 'Bebidas';
    form.fornecedor_id.value = produto.fornecedor_id || '';
    form.preco.value = produto.preco;
    form.estoque.value = produto.estoque;
    form.estoqueMinimo.value = produto.estoque_minimo;
    modal.style.display = 'flex';
  }

  document.getElementById('btn-cancelar-produto').addEventListener('click', () => modal.style.display = 'none');
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

  document.getElementById('form-produto').addEventListener('submit', async (e) => {
    e.preventDefault();
    const dados = new FormData(e.target);

    const preco = parseFloat((dados.get('preco') || '0').replace(/[^\d,\.]/g, '').replace(',', '.')) || 0;

    const corpo = {
      sku: dados.get('sku'),
      nome: dados.get('nome'),
      categoria: dados.get('categoria'),
      fornecedor_id: dados.get('fornecedor_id') || null,
      preco,
      estoque: parseInt(dados.get('estoque')) || 0,
      estoque_minimo: parseInt(dados.get('estoqueMinimo')) || 0,
    };

    const resp = editandoId
      ? await fetch(`/api/produtos/${editandoId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(corpo),
        })
      : await fetch('/api/produtos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(corpo),
        });

    if (!resp.ok) {
      const erro = await resp.json();
      alert(erro.erro || 'Erro ao salvar produto.');
      return;
    }

    form.sku.disabled = false;
    e.target.reset();
    modal.style.display = 'none';
    carregarProdutos();
  });

  carregarProdutos();
  carregarFornecedoresSelect();
</script>
</body>
</html>
