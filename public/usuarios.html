<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Usuários — Torra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .usuarios-grid { grid-template-columns: 1.3fr 1fr 1.4fr 1fr 100px 90px 120px 90px; }
  .info-perfis {
    display: flex; gap: 20px; background: #FFF7EA; border: 1px solid rgba(199,123,59,0.25);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 24px; font-size: 12.5px; color: var(--color-text-secondary);
  }
  .info-perfis strong { color: var(--color-text); }
</style>
</head>
<body data-page="usuarios">

<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="app-content">
    <div class="page-header">
      <div class="page-title">Usuários</div>
      <button class="btn btn-primary" id="btn-novo-usuario">+ Novo Usuário</button>
    </div>
    <div class="page-subtitle" style="margin-bottom:16px;">Acesso ao sistema é restrito a Administradores.</div>

    <div class="info-perfis">
      <div><strong>Administrador</strong> — acesso completo, incluindo Usuários e Fornecedores.</div>
      <div><strong>Funcionário</strong> — acesso a Produtos, Vendas e Clientes. Sem acesso a Usuários/Fornecedores.</div>
    </div>

    <div class="table-card">
      <div class="table-head-row usuarios-grid">
        <div>NOME</div><div>LOGIN</div><div>E-MAIL</div><div>TELEFONE</div><div>PERFIL</div><div>STATUS</div><div>ÚLTIMO ACESSO</div><div>AÇÕES</div>
      </div>
      <!-- TODO (Etapa 8 - Usuários/Perfil): substituir por GET /api/usuarios -->
      <div id="usuarios-tbody"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-usuario" style="display:none;">
    <div class="modal" style="width:440px;">
      <div class="modal-title">Novo Usuário</div>
      <form id="form-usuario">
        <div style="display:flex;flex-direction:column;gap:14px;">
          <label class="field">
            <span>Nome completo</span>
            <input type="text" name="nome" placeholder="Ex: João Silva" required>
          </label>
          <div class="field-grid">
            <label class="field">
              <span>Login</span>
              <input type="text" name="login" placeholder="joao.silva" required>
            </label>
            <label class="field">
              <span>Perfil</span>
              <select name="perfil">
                <option>Funcionário</option><option>Administrador</option>
              </select>
            </label>
          </div>
          <label class="field">
            <span>E-mail</span>
            <input type="email" name="email" placeholder="joao.silva@torracafe.com">
          </label>
          <label class="field">
            <span>Telefone</span>
            <input type="text" name="telefone" placeholder="(11) 90000-0000">
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancelar-usuario">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Usuário</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/partials.js"></script>
<script>
  // Dados de exemplo — serão substituídos por chamadas reais à API na Etapa 8.
  // Regra já definida: só um Administrador pode promover outro usuário a Administrador
  // (o select de Perfil acima é só visual por enquanto; a regra será aplicada no back-end).
  const USERS = [
    { nome: 'Camila Alves', login: 'camila.alves', email: 'camila@torracafe.com', telefone: '(11) 98111-2233', perfil: 'Administrador', ativo: true, ultimoAcesso: 'Hoje, 09:12' },
    { nome: 'João Silva', login: 'joao.silva', email: 'joao@torracafe.com', telefone: '(11) 97222-3344', perfil: 'Funcionário', ativo: true, ultimoAcesso: 'Hoje, 08:47' },
    { nome: 'Fernanda Reis', login: 'fernanda.reis', email: 'fernanda@torracafe.com', telefone: '(11) 96333-4455', perfil: 'Funcionário', ativo: true, ultimoAcesso: 'Ontem, 18:30' },
    { nome: 'Lucas Prado', login: 'lucas.prado', email: 'lucas@torracafe.com', telefone: '(11) 95444-5566', perfil: 'Funcionário', ativo: false, ultimoAcesso: '12/06/2026' },
  ];

  const tbody = document.getElementById('usuarios-tbody');

  function renderUsuarios() {
    tbody.innerHTML = USERS.map(u => `
      <div class="table-row usuarios-grid">
        <div style="font-weight:600;">${u.nome}</div>
        <div style="color:var(--color-text-secondary);">${u.login}</div>
        <div style="color:var(--color-text-secondary);">${u.email}</div>
        <div style="color:var(--color-text-secondary);">${u.telefone}</div>
        <div><span class="pill pill-sm ${u.perfil === 'Administrador' ? 'pill-accent' : 'pill-neutral'}">${u.perfil}</span></div>
        <div><span class="pill pill-sm ${u.ativo ? 'pill-success' : 'pill-neutral'}">${u.ativo ? 'Ativo' : 'Inativo'}</span></div>
        <div style="color:var(--color-text-muted);font-size:12.5px;">${u.ultimoAcesso}</div>
        <div class="table-actions"><a href="#">Editar</a></div>
      </div>
    `).join('');
  }

  renderUsuarios();

  const modal = document.getElementById('modal-usuario');
  document.getElementById('btn-novo-usuario').addEventListener('click', () => modal.style.display = 'flex');
  document.getElementById('btn-cancelar-usuario').addEventListener('click', () => modal.style.display = 'none');
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

  // TODO (Etapa 8 - Usuários/Perfil): substituir por POST real para /api/usuarios.
  document.getElementById('form-usuario').addEventListener('submit', (e) => {
    e.preventDefault();
    console.log('Salvar usuário ainda não implementado — aguardando Etapa 8.');
  });
</script>
</body>
</html>
