<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Usuários — Torra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .usuarios-grid { grid-template-columns: 1.3fr 1fr 1.4fr 1fr 100px 90px 120px 150px; }
  .info-perfis {
    display: flex; gap: 20px; background: #FFF7EA; border: 1px solid rgba(199,123,59,0.25);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 24px; font-size: 12.5px; color: var(--color-text-secondary);
  }
  .info-perfis strong { color: var(--color-text); }
</style>
</head>
<body data-page="usuarios">

<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="app-content">
    <div class="page-header">
      <div class="page-title">Usuários</div>
      <button class="btn btn-primary" id="btn-novo-usuario">+ Novo Usuário</button>
    </div>
    <div class="page-subtitle" style="margin-bottom:16px;">Acesso ao sistema é restrito a Administradores.</div>

    <div class="info-perfis">
      <div><strong>Administrador</strong> — acesso completo, incluindo Usuários e Fornecedores.</div>
      <div><strong>Funcionário</strong> — acesso a Produtos, Vendas e Clientes. Sem acesso a Usuários/Fornecedores.</div>
    </div>

    <div class="table-card">
      <div class="table-head-row usuarios-grid">
        <div>NOME</div><div>LOGIN</div><div>E-MAIL</div><div>TELEFONE</div><div>PERFIL</div><div>STATUS</div><div>ÚLTIMO ACESSO</div><div>AÇÕES</div>
      </div>
      <div id="usuarios-tbody"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-usuario" style="display:none;">
    <div class="modal" style="width:440px;">
      <div class="modal-title" id="modal-usuario-titulo">Novo Usuário</div>
      <form id="form-usuario">
        <div style="display:flex;flex-direction:column;gap:14px;">
          <label class="field">
            <span>Nome completo</span>
            <input type="text" name="nome" placeholder="Ex: João Silva" required>
          </label>
          <div class="field-grid">
            <label class="field">
              <span>Login</span>
              <input type="text" name="login" placeholder="joao.silva" required>
            </label>
            <label class="field">
              <span>Perfil</span>
              <select name="perfil">
                <option>Funcionário</option><option>Administrador</option>
              </select>
            </label>
          </div>
          <label class="field" id="campo-senha">
            <span>Senha inicial</span>
            <input type="password" name="senha" placeholder="••••••••" required>
          </label>
          <label class="field">
            <span>E-mail</span>
            <input type="email" name="email" placeholder="joao.silva@torracafe.com">
          </label>
          <label class="field">
            <span>Telefone</span>
            <input type="text" name="telefone" placeholder="(11) 90000-0000">
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancelar-usuario">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Usuário</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/partials.js"></script>
<script>
  let USERS = [];
  const tbody = document.getElementById('usuarios-tbody');

  async function carregarUsuarios() {
    const resp = await fetch('/api/usuarios');
    USERS = await resp.json();
    renderUsuarios();
  }

  function renderUsuarios() {
    tbody.innerHTML = USERS.map(u => `
      <div class="table-row usuarios-grid">
        <div style="font-weight:600;">${u.nome}</div>
        <div style="color:var(--color-text-secondary);">${u.login}</div>
        <div style="color:var(--color-text-secondary);">${u.email || '—'}</div>
        <div style="color:var(--color-text-secondary);">${u.telefone || '—'}</div>
        <div><span class="pill pill-sm ${u.perfil === 'Administrador' ? 'pill-accent' : 'pill-neutral'}">${u.perfil}</span></div>
        <div><span class="pill pill-sm ${u.ativo ? 'pill-success' : 'pill-neutral'}">${u.ativo ? 'Ativo' : 'Inativo'}</span></div>
        <div style="color:var(--color-text-muted);font-size:12.5px;">${u.ultimo_acesso || '—'}</div>
        <div class="table-actions">
          <button data-editar="${u.id}">Editar</button>
          ${u.ativo ? `<button data-inativar="${u.id}">Inativar</button>` : `<button data-reativar="${u.id}">Reativar</button>`}
          <button data-excluir="${u.id}">Excluir</button>
        </div>
      </div>
    `).join('');

    tbody.querySelectorAll('[data-inativar]').forEach(btn => {
      btn.addEventListener('click', () => inativarUsuario(btn.dataset.inativar));
    });
    tbody.querySelectorAll('[data-reativar]').forEach(btn => {
      btn.addEventListener('click', () => reativarUsuario(btn.dataset.reativar));
    });
    tbody.querySelectorAll('[data-excluir]').forEach(btn => {
      btn.addEventListener('click', () => excluirUsuario(btn.dataset.excluir));
    });
    tbody.querySelectorAll('[data-editar]').forEach(btn => {
      btn.addEventListener('click', () => abrirEdicao(btn.dataset.editar));
    });
  }

  async function inativarUsuario(id) {
    await fetch(`/api/usuarios/${id}/inativar`, { method: 'PATCH' });
    carregarUsuarios();
  }

  async function reativarUsuario(id) {
    await fetch(`/api/usuarios/${id}/reativar`, { method: 'PATCH' });
    carregarUsuarios();
  }

  async function excluirUsuario(id) {
    if (!confirm('Tem certeza que deseja excluir este usuário? Essa ação não pode ser desfeita.')) return;

    const resp = await fetch(`/api/usuarios/${id}`, { method: 'DELETE' });
    if (!resp.ok) {
      const erro = await resp.json();
      alert(erro.erro || 'Erro ao excluir usuário.');
      return;
    }
    carregarUsuarios();
  }

  let editandoId = null;
  const modal = document.getElementById('modal-usuario');
  const modalTitulo = document.getElementById('modal-usuario-titulo');
  const campoSenha = document.getElementById('campo-senha');
  const form = document.getElementById('form-usuario');

  document.getElementById('btn-novo-usuario').addEventListener('click', () => {
    editandoId = null;
    modalTitulo.textContent = 'Novo Usuário';
    form.reset();
    form.login.disabled = false;
    campoSenha.style.display = '';
    form.senha.required = true;
    modal.style.display = 'flex';
  });

  function abrirEdicao(id) {
    const usuario = USERS.find(u => u.id == id);
    editandoId = id;
    modalTitulo.textContent = 'Editar Usuário';
    form.nome.value = usuario.nome;
    form.login.value = usuario.login;
    form.login.disabled = true;
    form.perfil.value = usuario.perfil === 'Administrador' ? 'Administrador' : 'Funcionário';
    form.email.value = usuario.email || '';
    form.telefone.value = usuario.telefone || '';
    campoSenha.style.display = 'none';
    form.senha.required = false;
    modal.style.display = 'flex';
  }

  document.getElementById('btn-cancelar-usuario').addEventListener('click', () => modal.style.display = 'none');
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

  document.getElementById('form-usuario').addEventListener('submit', async (e) => {
    e.preventDefault();
    const dados = new FormData(e.target);

    const resp = editandoId
      ? await fetch(`/api/usuarios/${editandoId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome: dados.get('nome'),
            email: dados.get('email'),
            telefone: dados.get('telefone'),
            perfil: dados.get('perfil'),
          }),
        })
      : await fetch('/api/usuarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome: dados.get('nome'),
            login: dados.get('login'),
            senha: dados.get('senha'),
            email: dados.get('email'),
            telefone: dados.get('telefone'),
            perfil: dados.get('perfil'),
          }),
        });

    if (!resp.ok) {
      const erro = await resp.json();
      alert(erro.erro || 'Erro ao salvar usuário.');
      return;
    }

    form.login.disabled = false;
    e.target.reset();
    modal.style.display = 'none';
    carregarUsuarios();
  });

  carregarUsuarios();
</script>
</body>
</html>
